<!DOCTYPE html>
<html>
<head>
    <title>Negozio - Home</title>
    <link rel="stylesheet" href="/css/stile.css" />
</head>
<body>
    <header>
        <div th:if="${userDetails}">
            <span th:text="${userDetails.username}"></span>
            <a href="/logout">Logout</a>
        </div>
        <div th:unless="${userDetails}">
            <a href="/login">Login</a>
        </div>
    </header>
    <div><a href="/"><img src="/images/logo-siw.png" width="50%" /></a></div>
    <h1>Consulta il catalogo</h1>
    
    <div>
        <a href="/cds">Mostra tutti i CD</a>
    </div>
    <div>
        <a href="/authors">Mostra tutti gli Autori</a>
    </div>

    <h2>Tutti i prodotti:</h2>
    <div th:if="${cds == null || cds.isEmpty()}">Non ci sono prodotti nel sistema</div>
    <ul th:if="${cds != null && !cds.isEmpty()}">
        <li th:each="cd : ${cds}">
            <a th:href="@{'/cds/' + ${cd.id}}" th:text="${cd.name} + ' (' + ${cd.yearOfRelease} + ')'">Titolo CD</a>
            <span th:text="'- ' + ${cd.author.name} + ' ' + ${cd.author.surname}"> - Autore</span>
        </li>
    </ul>

    <div th:if="${isAdmin}">
        <br>
        <hr>
        <h2>Gestisci (Riservato agli amministratori)</h2>
        <div>
            <ul>
                <li><a href="/admin/index">Pannello inserimenti e cancellazioni</a></li>
            </ul>
        </div>
    </div>
</body>
</html>
