<!DOCTYPE html>
<html>
<head>
    <title>Negozio - Home</title>
    <link rel="stylesheet" href="/css/stile.css" />
</head>
<body>
    <header class="navbar">
        <div class="navbar-container">
            <div class="nav-brand">
                <a href="/"><img src="/images/logo.png" alt="Logo" /></a>
            </div>
            <div class="nav-actions">
                <div th:if="${userDetails}" style="display: flex; align-items: center; gap: 15px;">
                    <a href="/cart" style="font-size: 1.2em; text-decoration: none;">🛒 Carrello</a>
                    <span th:text="${userDetails.username}"></span>
                    <form th:action="@{/logout}" method="POST">
                        <button type="submit" class="btn-logout">Logout</button>
                    </form>
                </div>
                <div th:unless="${userDetails}">
                    <a href="/login">Accedi</a> | <a href="/register">Registrati</a>
                </div>
            </div>
        </div>
    </header>

    <h1>Consulta il catalogo</h1>
    
    <div class="home-grid">
        <a href="/cds" class="home-card">
            <span class="home-card-icon">💿</span>
            <span class="home-card-title">CD Musicali</span>
        </a>
        <a href="/authors" class="home-card">
            <span class="home-card-icon">🎤</span>
            <span class="home-card-title">Autori</span>
        </a>
    </div>

    <div th:if="${userDetails}" style="margin-bottom: 40px;">
        <a href="/reservations" class="home-card">
            <span class="home-card-icon">📅</span>
            <span class="home-card-title">Le mie prenotazioni</span>
        </a>
    </div>

    <div th:unless="${userDetails}" style="text-align: center; margin-top: 20px;">
        <p><a href="/login" style="font-weight: bold; text-decoration: underline;">Accedi</a> per vedere le tue prenotazioni.</p>
    </div>



    <div th:if="${isAdmin}">
        <h2>Gestisci (Riservato agli Amministratori)</h2>
        <div class="home-grid" style="grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));">
            <a href="/admin/index" class="home-card" style="border-color: var(--primary-color);">
                <span class="home-card-icon">🛠️</span>
                <span class="home-card-title">Pannello Inserimenti e Cancellazioni</span>
            </a>
        </div>
    </div>
</body>
</html>
