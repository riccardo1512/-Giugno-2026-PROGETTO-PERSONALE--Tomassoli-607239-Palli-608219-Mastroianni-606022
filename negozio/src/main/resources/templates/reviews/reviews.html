<!DOCTYPE html>
<html>

<head>
    <title>Recensioni (Standard)</title>
    <link rel="stylesheet" href="/css/stile.css" />
</head>

<body>
    <header class="navbar">
        <div class="navbar-container">
            <div class="nav-brand">
                <a href="/"><img src="/images/logo.png" alt="Logo" /></a>
            </div>
            <div class="nav-actions">
                <div th:if="${userDetails}" style="display: flex; align-items: center; gap: 15px;">
                    <span th:text="${userDetails.username}"></span>
                    <form th:action="@{/logout}" method="POST">
                        <button type="submit" class="btn-logout">Logout</button>
                    </form>
                </div>
                <div th:unless="${userDetails}">
                    <a href="/login">Accedi</a> | <a href="/register">Registrati</a>
                </div>
            </div>
        </div>
    </header>

    <div class="reviews-wrapper">
        <h1 class="section-title">Recensioni per <span th:text="${cd.name}">CD</span></h1>

        <div th:if="${userDetails}" class="review-form-container glass-panel">
            <h3 class="section-title">Aggiungi una Recensione</h3>
            <form th:action="@{'/cds/' + ${cd.id} + '/reviews'}" th:object="${review}" method="POST" class="review-form">
                <div class="form-group">
                    <label>Titolo:</label>
                    <input type="text" th:field="*{title}" required class="form-input" placeholder="Un titolo accattivante..." />
                    <span th:if="${#fields.hasErrors('title')}" th:errors="*{title}" class="error"></span>
                </div>
                
                <div class="form-group">
                    <label>Voto (1-5):</label>
                    <input type="number" th:field="*{rating}" min="1" max="5" required class="form-input" />
                    <span th:if="${#fields.hasErrors('rating')}" th:errors="*{rating}" class="error"></span>
                </div>

                <div class="form-group">
                    <label>Testo:</label>
                    <textarea th:field="*{text}" required rows="4" class="form-input" placeholder="Scrivi qui la tua opinione..."></textarea>
                    <span th:if="${#fields.hasErrors('text')}" th:errors="*{text}" class="error"></span>
                </div>

                <button type="submit" class="btn-submit">Salva Recensione</button>
            </form>
        </div>

        <div th:unless="${userDetails}" class="login-prompt glass-panel">
            <p><a href="/login" class="accent-link">Accedi</a> per aggiungere una recensione.</p>
        </div>

    </div>
    
    <br>
    <div style="text-align: center;">
        <a th:href="@{'/cds/' + ${cd.id}}" class="back-link" style="display: inline-block;">Torna al CD</a>
    </div>

</body>

</html>
