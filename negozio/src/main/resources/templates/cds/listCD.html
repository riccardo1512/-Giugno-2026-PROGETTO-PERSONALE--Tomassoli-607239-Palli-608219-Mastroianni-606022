<!DOCTYPE html>
<html>

<head>
    <title>CD Musicali</title>
    <link rel="stylesheet" href="/css/stile.css" />
</head>

<body>
    <header class="navbar">
        <div class="navbar-container">
            <div class="nav-brand">
                <a href="/"><img src="/images/logo.png" alt="Logo" /></a>
            </div>
            <div class="nav-actions">
                <div th:if="${userDetails}" style="display: flex; align-items: center; gap: 15px;">
                    <a href="/cart" style="font-size: 1.2em; text-decoration: none;">🛒 Carrello</a>
                    <span th:text="${userDetails.username}"></span>
                    <form th:action="@{/logout}" method="POST">
                        <button type="submit" class="btn-logout">Logout</button>
                    </form>
                </div>
                <div th:unless="${userDetails}">
                    <a href="/login">Accedi</a> | <a href="/register">Registrati</a>
                </div>
            </div>
        </div>
    </header>
    <h1 class="section-title" style="text-align: center;">Esplora i Nostri CD</h1>
    
    <div th:if="${isAdmin}" style="text-align: center; margin-bottom: 30px;">
        <a href="/admin/cds/new" class="btn-action">➕ Crea Nuovo CD</a>
    </div>

    <div th:if="${cds==null || cds.isEmpty()}" style="text-align: center; color: dimgray; margin-top: 50px;">
        <p>Non ci sono CD nel sistema al momento.</p>
    </div>
    
    <div class="home-grid" th:unless="${cds==null || cds.isEmpty()}">
        <a th:each="cd : ${cds}" th:href="@{'/cds/' + ${cd.id}}" class="home-card" style="text-decoration: none;">
            <div style="font-size: 3rem; margin-bottom: 10px;">💿</div>
            <div class="home-card-title" th:text="${cd.name}" style="color: var(--primary-color);">Titolo CD</div>
            <div style="font-size: 1.2rem; font-weight: bold; color: darkslategray;" th:text="'€' + ${#numbers.formatDecimal(cd.price, 1, 2)}">Prezzo</div>
            <div style="font-size: 0.9rem; color: dimgray; margin-top: auto;">
                Scopri di più &rarr;
            </div>
        </a>
    </div>
</body>

</html>
