<!DOCTYPE html>
<html>

<head>
    <title>Dettagli Prenotazione</title>
    <link rel="stylesheet" href="/css/stile.css" />
</head>

<body>
    <div><a href="/"><img src="/images/logo-siw.png" width="50%" /></a></div>
    <h1>Dettagli Prenotazione</h1>

    <div th:if="${reservation}">
        <p><strong>Data:</strong> <span th:text="${reservation.date}">Data</span></p>
        <p><strong>Stato:</strong> <span th:text="${reservation.state}">Stato</span></p>
        <p th:if="${reservation.user}"><strong>Utente:</strong> <span th:text="${reservation.user.username}">Utente</span></p>
        
        <h3>Elementi della Prenotazione:</h3>
        <div th:if="${reservation.items==null || reservation.items.isEmpty()}">Nessun elemento presente in questa prenotazione.</div>
        <ul th:if="${reservation.items!=null && !reservation.items.isEmpty()}">
            <li th:each="item : ${reservation.items}">
                <a th:href="@{'/reservationItems/' + ${item.id}}" th:text="${item.cd.name} + ' (Quantità: ' + ${item.quantity} + ')'">Dettaglio Elemento</a>
            </li>
        </ul>

        <div th:if="${isAdmin}">
            <hr>
            <h3>Amministrazione</h3>
            <a th:href="@{'/admin/reservations/' + ${reservation.id} + '/edit'}">Modifica Prenotazione</a>
            <form th:action="@{'/admin/reservations/' + ${reservation.id} + '/delete'}" method="POST" style="display:inline;">
                <button type="submit" onclick="return confirm('Sei sicuro di voler eliminare questa prenotazione?')">Elimina Prenotazione</button>
            </form>
        </div>
    </div>

    <div th:unless="${reservation}">
        La prenotazione richiesta non esiste.
    </div>

    <div>
        <br>
        <a href="/reservations">Torna all'elenco delle prenotazioni</a>
    </div>
</body>

</html>
