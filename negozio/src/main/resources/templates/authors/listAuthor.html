<!DOCTYPE html>
<html>

<head>
    <title>Autori</title>
    <link rel="stylesheet" href="/css/stile.css" />
</head>

<body>
    <header class="navbar">
        <div class="navbar-container">
            <div class="nav-brand">
                <a href="/"><img src="/images/logo.png" alt="Logo" /></a>
            </div>
            <div class="nav-actions">
                <div th:if="${userDetails}" style="display: flex; align-items: center; gap: 15px;">
                    <span th:text="${userDetails.username}"></span>
                    <form th:action="@{/logout}" method="POST">
                        <button type="submit" class="btn-logout">Logout</button>
                    </form>
                </div>
                <div th:unless="${userDetails}">
                    <a href="/login">Accedi</a> | <a href="/register">Registrati</a>
                </div>
            </div>
        </div>
    </header>
    <h1 class="section-title" style="text-align: center;">I Nostri Autori</h1>
    
    <div th:if="${isAdmin}" style="text-align: center; margin-bottom: 30px;">
        <a href="/admin/authors/new" class="btn-action">➕ Crea Nuovo Autore</a>
    </div>

    <div th:if="${authors==null || authors.isEmpty()}" style="text-align: center; color: dimgray; margin-top: 50px;">
        <p>Non ci sono autori nel sistema al momento.</p>
    </div>
    
    <div class="home-grid" th:unless="${authors==null || authors.isEmpty()}">
        <a th:each="author : ${authors}" th:href="@{'/authors/' + ${author.id}}" class="home-card" style="text-decoration: none;">
            <div style="font-size: 3rem; margin-bottom: 10px;">🎤</div>
            <div class="home-card-title" th:text="${author.name} + ' ' + ${author.surname}" style="color: var(--primary-color);">Nome Autore</div>
            <div style="font-size: 0.9rem; color: dimgray; margin-top: auto;">
                Scopri di più &rarr;
            </div>
        </a>
    </div>
</body>

</html>
