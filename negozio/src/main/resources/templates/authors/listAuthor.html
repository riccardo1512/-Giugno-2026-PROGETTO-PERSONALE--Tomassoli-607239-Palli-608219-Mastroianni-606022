<!DOCTYPE html>
<html>

<head>
    <title>Autori</title>
    <link rel="stylesheet" href="/css/stile.css" />
</head>

<body>
    <header class="navbar">
        <div class="navbar-container">
            <div class="nav-brand">
                <a href="/"><img src="/images/logo.png" alt="Logo" /></a>
            </div>
            <div class="nav-actions">
                <div th:if="${userDetails}" style="display: flex; align-items: center; gap: 15px;">
                    <span th:text="${userDetails.username}"></span>
                    <form th:action="@{/logout}" method="POST">
                        <button type="submit" class="btn-logout">Logout</button>
                    </form>
                </div>
                <div th:unless="${userDetails}">
                    <a href="/login">Accedi</a> | <a href="/register">Registrati</a>
                </div>
            </div>
        </div>
    </header>
    <h1>Autori</h1>
    
    <div th:if="${isAdmin}" style="margin-bottom: 20px;">
        <a href="/admin/authors/new"><button>Crea Nuovo Autore</button></a>
    </div>

    <div th:if="${authors==null || authors.isEmpty()}">Non ci sono autori nel sistema</div>
    <ul>
        <li th:each="author : ${authors}">
            <a th:href="@{'/authors' + '/' + ${author.id}}" th:text="${author.name} + ' ' + ${author.surname}">Nome Autore</a>
        </li>
    </ul>
</body>

</html>
