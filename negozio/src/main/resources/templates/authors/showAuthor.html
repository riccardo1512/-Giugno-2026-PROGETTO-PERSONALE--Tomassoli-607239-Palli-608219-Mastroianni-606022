<!DOCTYPE html>
<html>

<head>
    <title>Dettagli Autore</title>
    <link rel="stylesheet" href="/css/stile.css" />
</head>

<body>
    <header class="navbar">
        <div class="navbar-container">
            <div class="nav-brand">
                <a href="/"><img src="/images/logo.png" alt="Logo" /></a>
            </div>
            <div class="nav-actions">
                <div th:if="${userDetails}" style="display: flex; align-items: center; gap: 15px;">
                    <span th:text="${userDetails.username}"></span>
                    <form th:action="@{/logout}" method="POST">
                        <button type="submit" class="btn-logout">Logout</button>
                    </form>
                </div>
                <div th:unless="${userDetails}">
                    <a href="/login">Accedi</a> | <a href="/register">Registrati</a>
                </div>
            </div>
        </div>
    </header>
    <div th:if="${error}" class="error" style="color:red; margin-bottom: 15px;">
        <p th:text="${error}">Messaggio di errore</p>
    </div>

    <div class="details-card" th:if="${author}">
        <h1 class="details-title" th:text="${author.name} + ' ' + ${author.surname}">Nome Cognome</h1>
        
        <div class="details-meta">
            <span th:text="'Nazionalità: ' + ${author.nationality}">Nazionalità</span>
            <span th:text="'Nato: ' + ${author.dateOfBirth}">Data di Nascita</span>
            <span th:if="${author.dateOfDeath}" th:text="'Morto: ' + ${author.dateOfDeath}">Data di Morte</span>
        </div>

        <div style="margin-top: 20px; text-align: left;">
            <h3 style="color: var(--primary-color);">CD Musicali:</h3>
            <ul th:if="${not #lists.isEmpty(author.cds)}">
                <li th:each="cd : ${author.cds}">
                    <a th:href="@{'/cds/' + ${cd.id}}" th:text="${cd.name}">Titolo CD</a>
                    <span th:text="'(' + ${cd.yearOfRelease} + ')'">Anno</span>
                </li>
            </ul>
            <span th:if="${#lists.isEmpty(author.cds)}" style="color: dimgray;">Nessun CD presente</span>
        </div>

        <div th:if="${isAdmin}" style="margin-top: 30px;">
            <hr>
            <h3>Amministrazione</h3>
            <a th:href="@{'/admin/authors/' + ${author.id} + '/edit'}" class="btn-action">Modifica Autore</a>
            
            <div style="display: flex; gap: 10px; margin-top: 20px; justify-content: center; flex-wrap: wrap;">

                <form th:action="@{'/admin/authors/' + ${author.id} + '/deleteWithCDs'}" method="POST" style="background:none; border:none; box-shadow:none; padding:0; margin:0;">
                    <button type="submit" class="btn-danger" onclick="return confirm('ATTENZIONE: Sei sicuro di voler eliminare questo autore E TUTTI I SUOI CD dal negozio in modo irreversibile?')">Elimina Autore + Suoi CD</button>
                </form>
            </div>
        </div>
    </div>

    <div th:unless="${author}">
        L'autore richiesto non esiste.
    </div>

    <a href="/authors" class="back-link">Torna all'elenco degli autori</a>
</body>

</html>
