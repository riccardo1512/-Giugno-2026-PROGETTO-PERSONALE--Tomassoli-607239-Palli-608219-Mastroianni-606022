<!DOCTYPE html>
<html>

<head>
    <title>Dettagli Autore</title>
    <link rel="stylesheet" href="/css/stile.css" />
</head>

<body>
    <div><a href="/"><img src="/images/logo-siw.png" width="50%" /></a></div>
    <h1>Dettagli Autore</h1>

    <div th:if="${error}" class="error" style="color:red; margin-bottom: 15px;">
        <p th:text="${error}">Messaggio di errore</p>
    </div>

    <div th:if="${author}">
        <span th:text="${author.name}">Nome</span>
        <span th:text="${author.surname}">Cognome</span>
        
        <div>
            <strong>Nazionalità:</strong> <span th:text="${author.nationality}">Nazionalità</span>
        </div>
        <div>
            <strong>Data di Nascita:</strong> <span th:text="${author.dateOfBirth}">Data di Nascita</span>
        </div>
        <div th:if="${author.dateOfDeath}">
            <strong>Data di Morte:</strong> <span th:text="${author.dateOfDeath}">Data di Morte</span>
        </div>

        <div>
            <strong>CD Musicali:</strong>
            <ul th:if="${not #lists.isEmpty(author.cds)}">
                <li th:each="cd : ${author.cds}">
                    <a th:href="@{'/cds/' + ${cd.id}}" th:text="${cd.name}">Titolo CD</a>
                    <span th:text="'(' + ${cd.yearOfRelease} + ')'">Anno</span>
                </li>
            </ul>
            <span th:if="${#lists.isEmpty(author.cds)}">Nessun CD presente</span>
        </div>

        <div th:if="${isAdmin}">
            <hr>
            <h3>Amministrazione</h3>
            <a th:href="@{'/admin/authors/' + ${author.id} + '/edit'}">Modifica Autore</a>
            <br><br>
            <form th:action="@{'/admin/authors/' + ${author.id} + '/delete'}" method="POST" style="display:inline;">
                <button type="submit" onclick="return confirm('Sei sicuro di voler eliminare l\'autore? Se ha ancora CD associati, l\'operazione fallirà.')">Elimina Solo Autore</button>
            </form>
            
            <form th:action="@{'/admin/authors/' + ${author.id} + '/deleteWithCDs'}" method="POST" style="display:inline; margin-left: 10px;">
                <button type="submit" style="color: red;" onclick="return confirm('ATTENZIONE: Sei sicuro di voler eliminare questo autore E TUTTI I SUOI CD dal negozio in modo irreversibile?')">Elimina Autore + Suoi CD</button>
            </form>
        </div>
    </div>

    <div th:unless="${author}">
        L'autore richiesto non esiste.
    </div>

    <div>
        <br>
        <a href="/authors">Torna all'elenco degli autori</a>
    </div>
</body>

</html>
