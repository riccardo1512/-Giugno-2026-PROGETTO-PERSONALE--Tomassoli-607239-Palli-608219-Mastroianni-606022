<!DOCTYPE html>
<html>

<head>
	<title>
		Negozio - Registrazione
	</title>
	<link rel="stylesheet" href="/css/stile.css" />
</head>

<body>
	<header class="navbar">
		<div class="navbar-container">
			<div class="nav-brand">
				<a href="/"><img src="/images/logo.png" alt="Logo" /></a>
			</div>
			<div class="nav-actions">
				<div th:if="${userDetails}" style="display: flex; align-items: center; gap: 15px;">
					<span th:text="${userDetails.username}"></span>
					<form th:action="@{/logout}" method="POST">
						<button type="submit" class="btn-logout">Logout</button>
					</form>
				</div>
				<div th:unless="${userDetails}">
					<a href="/login">Accedi</a> | <a href="/register">Registrati</a>
				</div>
			</div>
		</div>
	</header>
	<form th:action="@{/register}" method="POST" class="auth-card">
		<h1 style="text-align: center; border: none; margin-top: 0; padding-bottom: 15px;">Registrati</h1>
        
		<div>
			<label>Nome</label>
			<input type="text" placeholder="Mario" required th:field="${user.name}" />
			<span class="error-message" th:if="${#fields.hasErrors('user.name')}" th:errors="${user.name}"></span>
		</div>
		<div>
			<label>Cognome</label>
			<input type="text" placeholder="Rossi" required th:field="${user.surname}" />
			<span class="error-message" th:if="${#fields.hasErrors('user.surname')}" th:errors="${user.surname}"></span>
		</div>

		<div>
			<label>Username (Email)</label>
			<input type="text" placeholder="mario.rossi@email.com" required th:field="${credentials.username}" />
			<span class="error-message" th:if="${#fields.hasErrors('credentials.username')}" th:errors="${credentials.username}"></span>
		</div>
		<div>
			<label>Password</label>
			<input type="password" placeholder="La tua password segreta..." required th:field="${credentials.password}" />
			<span class="error-message" th:if="${#fields.hasErrors('credentials.password')}" th:errors="${credentials.password}"></span>
		</div>
		
		<div style="text-align: center; margin-top: 10px;">
			<button type="submit" style="width: 100%;">Crea Account ✨</button>
		</div>

		<hr style="margin: 25px 0; border: 0; border-top: 1px solid lightgray;">

		<div style="text-align: center;">
			<p style="margin-bottom: 15px; color: dimgray; font-size: 14px;">Oppure registrati con i tuoi social:</p>
			
			<a th:href="@{/oauth2/authorization/google}" class="btn-google">
				<img src="https://www.svgrepo.com/show/475656/google-color.svg" class="auth-icon" alt="Google"/> 
				Continua con Google
			</a>
			
			<a th:href="@{/oauth2/authorization/github}" class="btn-github">
				<img src="https://www.svgrepo.com/show/512317/github-142.svg" class="auth-icon" alt="GitHub" style="filter: invert(1);"/> 
				Continua con GitHub
			</a>
		</div>

		<div style="text-align: center; margin-top: 25px; font-size: 14px;">
			Hai già un account? <a th:href="@{/login}" style="font-weight: bold;">Accedi ora!</a>
		</div>
	</form>
</body>

</html>
