<!DOCTYPE html>
<html>

<head>
    <title>Elementi Prenotati</title>
    <link rel="stylesheet" href="/css/stile.css" />
</head>

<body>
    <div><a href="/"><img src="/images/logo-siw.png" width="50%" /></a></div>
    <h1>Elementi Prenotati</h1>
    <div th:if="${reservationItems==null || reservationItems.isEmpty()}">Non ci sono elementi prenotati nel sistema</div>
    <ul>
        <li th:each="reservationItem : ${reservationItems}">
            <a th:href="@{'/reservationItems/' + ${reservationItem.id}}" th:text="${reservationItem.cd.name} + ' (Quantità: ' + ${reservationItem.quantity} + ')'">Dettaglio Elemento</a>
        </li>
    </ul>
</body>

</html>
